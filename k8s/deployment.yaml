apiVersion: apps/v1
kind: Deployment
metadata:
  name: slash-command-amb
  namespace: slash-command
  labels:
    app: slash-command-amb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slash-command-amb
  template:
    metadata:
      labels:
        app: slash-command-amb
    spec:
      containers:
        - name: slash-command-amb
          image: registry.manty.co.kr/slash-command-amb:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
